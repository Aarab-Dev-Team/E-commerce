services:
  app:
    image: php:8.3-cli
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    command: >
      bash -c "
      apt update &&
      apt install -y git curl unzip zip libzip-dev default-mysql-client nodejs npm &&
      docker-php-ext-install pdo pdo_mysql zip &&
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
      composer install &&
      php artisan key:generate &&
      php artisan migrate --force || true &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_DATABASE: e_commerce
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  node:
    image: node:20
    container_name: laravel_vite
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: >
      bash -c "
      npm install &&
      npm run dev -- --host 0.0.0.0
      "

volumes:
  mysql_data: